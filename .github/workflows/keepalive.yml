# Keep the free HF Space warm: it sleeps after ~48h idle, so we ping every 6h
# (well under the threshold). Also touches the DB so Supabase doesn't pause.
# NOTE: GitHub-cron pings can be delayed and stop after 60 days of repo inactivity;
# for bulletproof always-on, add an external pinger too (UptimeRobot, every 5 min).
name: Keep-alive

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health + touch the database
        run: |
          curl -sf https://hv1998-careeragent-api.hf.space/api/health
          curl -sf https://hv1998-careeragent-api.hf.space/api/applications > /dev/null
