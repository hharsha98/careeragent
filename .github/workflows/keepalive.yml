# Free-tier housekeeping, twice a week:
#  - touch the database through the API so Supabase doesn't pause after 7 idle days
#  - reset the demo workspace to a clean state for the next visitor
name: Keep-alive & demo reset

on:
  schedule:
    - cron: '0 6 * * 1,4'   # Mondays and Thursdays, 06:00 UTC
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health + touch the database
        run: |
          curl -sf https://hv1998-careeragent-api.hf.space/api/health
          curl -sf https://hv1998-careeragent-api.hf.space/api/applications > /dev/null
